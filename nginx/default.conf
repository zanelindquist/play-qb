# ----------------------
# Development NGINX Config
# ----------------------

# Serve frontend over HTTP only
server {
    listen 80;
    server_name localhost 10.104.5.175;  # Add your dev IP here

    root /usr/share/nginx/html;  # React Native build output
    index index.html;

    # Serve static files or fallback to index.html
    location / {
        try_files $uri /index.html =404;
        default_type text/html;
    }

    # Proxy API requests to Flask backend
    location /api/ {
        proxy_pass http://qb-app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Auth endpoints to Flask backend
    location /auth/ {
        proxy_pass http://qb-app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Websockets for socket.io
    location /socket.io/ {
        proxy_pass http://qb-app:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Catch-all to support React Router
    error_page 404 =200 /index.html;
}